apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: creator-companion-api
  namespace: default
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "20"
        run.googleapis.com/cloudsql-instances: "PROJECT_ID:REGION:creator-companion-db"
        run.googleapis.com/cpu-throttling: "false"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: gcr.io/PROJECT_ID/creator-companion-api:latest
          ports:
            - containerPort: 8000
          resources:
            limits:
              cpu: "2"
              memory: "2Gi"
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: creator-companion-secrets
                  key: database_url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: creator-companion-secrets
                  key: redis_url
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: creator-companion-secrets
                  key: secret_key
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: creator-companion-secrets
                  key: openai_api_key
            - name: PINECONE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: creator-companion-secrets
                  key: pinecone_api_key
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30